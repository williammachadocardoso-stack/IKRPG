<!DOCTYPE html>

<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Ficha RPG</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <input id="id" placeholder="ID do personagem">

  <button onclick="carregar()">Carregar</button>
  <button onclick="salvar()">Salvar</button>

  <div class="sheet">

    <input class="field nome" id="nome">
    <input class="field classe" id="classe">
    <input class="field hp" id="hp">
    <input class="field mana" id="mana">
    <input class="field forca" id="forca">

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
